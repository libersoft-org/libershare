<ol class="breadcrumb">
 <li class="item active">Categories</li>
</ol>
<div>
 <a class="button primary" onclick="getPage('category/new')">New category</a>
 <span>
  {SEARCH-VALUES}
  <input type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
  <input class="button primary" type="submit" value="Search" />
 </span>
</div>
{ERROR}
<table>
 <thead>
  <tr>
   <th>
    <span>Name</span>
    <a href="{ORDER-NAME-ASC}">
     <img src="/img/up.svg" alt="Ascending" />
    </a>
    <a href="{ORDER-NAME-DESC}">
     <img src="/img/down.svg" alt="Descending" />
    </a>
   </th>
   <th class="text-center">
    <span>Items</span>
    <a href="{ORDER-ITEMS-ASC}">
     <img src="/img/up.svg" alt="Ascending" />
    </a>
    <a href="{ORDER-ITEMS-DESC}">
     <img src="/img/down.svg" alt="Descending" />
    </a>
    <span class="font-small">(all / visible / hidden)</span>
   </th>
   <th class="text-center">
    <span>Size</span>
    <a href="{ORDER-SIZE-ASC}"><img src="/img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-SIZE-DESC}"> <img src="/img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Visits</span>
    <a href="{ORDER-VISITS-ASC}"><img src="/img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-VISITS-DESC}"><img src="/img/down.svg" alt="Descending" /></a>
    <span class="font-small">(all / by session / by IP)</span>
   </th>
   <th>
    <span>Created</span>
    <a href="{ORDER-CREATED-ASC}"><img src="/img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-CREATED-DESC}"><img src="/img/down.svg" alt="Descending" /></a>
   </th>
   <th>Action</th>
  </tr>
 </thead>
 <tbody>{CATEGORIES}</tbody>
 <script>getPage('categories', {{PARAMS}});</script>
</table>
