<ol class="breadcrumb">
 <li class="item active">Categories</li>
</ol>
<div>
 <a class="button primary" onclick="getPage('category/new')">New category</a>
 <span>
  {SEARCH-VALUES}
  <input type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
  <input class="button primary" type="submit" value="Search" />
 </span>
</div>
{ERROR}
<table>
 <thead>
  <tr>
   <th>
    <span>Name</span>
    <a onclick="sort('{ORDER-NAME-ASC}')">
     <img src="/img/up.svg" alt="Ascending" />
    </a>
    <a onclick="sort('{ORDER-NAME-DESC}')">
     <img src="/img/down.svg" alt="Descending" />
    </a>
   </th>
   <th class="text-center">
    <span>Items</span>
    <a onclick="sort('{ORDER-ITEMS-ASC}')">
     <img src="/img/up.svg" alt="Ascending" />
    </a>
    <a onclick="sort('{ORDER-ITEMS-DESC}')">
     <img src="/img/down.svg" alt="Descending" />
    </a>
    <span class="font-small">(all / visible / hidden)</span>
   </th>
   <th class="text-center">
    <span>Size</span>
    <a onclick="sort('{ORDER-SIZE-ASC}')"><img src="/img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SIZE-DESC}')"> <img src="/img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Visits</span>
    <a onclick="sort('{ORDER-VISITS-ASC}')"><img src="/img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-VISITS-DESC}')"><img src="/img/down.svg" alt="Descending" /></a>
    <span class="font-small">(all / by session / by IP)</span>
   </th>
   <th>
    <span>Created</span>
    <a onclick="sort('{ORDER-CREATED-ASC}')"><img src="/img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-CREATED-DESC}')"><img src="/img/down.svg" alt="Descending" /></a>
   </th>
   <th>Action</th>
  </tr>
 </thead>
 <tbody>{CATEGORIES}</tbody>
 <script>getPage('categories', {{PARAMS}});</script>
</table>
