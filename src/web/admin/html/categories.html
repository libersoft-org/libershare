<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Categories</li>
</ol>
<div class="mb-3">
 <form action="./" method="get">
  <a class="button" href="./?page=category-new">New category</a>
  <span>
   {SEARCH-VALUES}
   <input class="form-control d-inline w-auto" type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
   <input class="button" type="submit" value="Search" />
  </span>
 </form>
</div>
{ERROR}
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     <span>Name</span>
     <a href="{ORDER-NAME-ASC}">
      <img class="table-icon" src="img/up.svg" alt="Ascending" />
     </a>
     <a href="{ORDER-NAME-DESC}">
      <img class="table-icon" src="img/down.svg" alt="Descending" />
     </a>
    </th>
    <th class="text-center">
     <span>Products</span>
     <a href="{ORDER-PRODUCTS-ASC}">
      <img class="table-icon" src="img/up.svg" alt="Ascending" />
     </a>
     <a href="{ORDER-PRODUCTS-DESC}">
      <img class="table-icon" src="img/down.svg" alt="Descending" />
     </a>
     <span class="font-small">(all / visible / hidden)</span>
    </th>
    <th class="text-center">
     <span>Size</span>
     <a href="{ORDER-SIZE-ASC}">
      <img class="table-icon" src="img/up.svg" alt="Ascending" />
     </a>
     <a href="{ORDER-SIZE-DESC}"> <img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th class="text-center">
     <span>Visits</span>
     <a href="{ORDER-VISITS-ASC}">
      <img class="table-icon" src="img/up.svg" alt="Ascending" />
     </a>
     <a href="{ORDER-VISITS-DESC}">
      <img class="table-icon" src="img/down.svg" alt="Descending" />
     </a>
     <span class="font-small">(all / by session / by IP)</span>
    </th>
    <th>
     <span>Created</span>
     <a href="{ORDER-CREATED-ASC}">
      <img class="table-icon" src="img/up.svg" alt="Ascending" />
     </a>
     <a href="{ORDER-CREATED-DESC}">
      <img class="table-icon" src="img/down.svg" alt="Descending" />
     </a>
    </th>
    <th>Action</th>
   </tr>
  </thead>
  <tbody>
   {CATEGORIES}
  </tbody>
  <script>
   GetPage('categories', {{PARAMS}});
  </script>
 </table>
</div>
