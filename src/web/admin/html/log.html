<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Log</li>
</ol>
<div class="mb-3">
 <span class="dropdown">
  <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Admin: {admin-selected}</button>
  <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
   <a class="dropdown-item" href="{admin-link-all}">Všichni</a>
   {admins}
  </div>
 </span>
</div>
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     Jméno admina <a href="{order-name-asc}"><img class="table-icon" src="template/img/up.svg" alt="Jméno admina vzestupně" /></a><a href="{order-name-desc}"><img class="table-icon" src="template/img/down.svg" alt="Jméno admina sestupně" /></a>
    </th>
    <th>
     Zpráva <a href="{order-message-asc}"><img class="table-icon" src="template/img/up.svg" alt="Zpráva vzestupně" /></a><a href="{order-message-desc}"><img class="table-icon" src="template/img/down.svg" alt="Zpráva sestupně" /></a>
    </th>
    <th>
     IP adresa <a href="{order-ip-asc}"><img class="table-icon" src="template/img/up.svg" alt="IP adresa vzestupně" /></a><a href="{order-ip-desc}"><img class="table-icon" src="template/img/down.svg" alt="IP adresa sestupně" /></a>
    </th>
    <th>
     Session ID <a href="{order-session-asc}"><img class="table-icon" src="template/img/up.svg" alt="Session ID vzestupně" /></a><a href="{order-session-desc}"><img class="table-icon" src="template/img/down.svg" alt="Session ID sestupně" /></a>
    </th>
    <th>
     User agent <a href="{order-useragent-asc}"><img class="table-icon" src="template/img/up.svg" alt="User agent vzestupně" /></a><a href="{order-useragent-desc}"><img class="table-icon" src="template/img/down.svg" alt="User agent sestupně" /></a>
    </th>
    <th>
     Datum a čas <a href="{order-created-asc}"><img class="table-icon" src="template/img/up.svg" alt="Datum a čas vzestupně" /></a><a href="{order-created-desc}"><img class="table-icon" src="template/img/down.svg" alt="Datum a čas sestupně" /></a>
    </th>
   </tr>
  </thead>
  <tbody>
   {table-log}
  </tbody>
  <script>
   GetPage('log', {{params}});
  </script>
 </table>
</div>
