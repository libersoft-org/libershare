<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Statistika hledání</li>
</ol>
<div class="mb-3">
 <form action="./" method="get">
  <span>
   {search-values}
   <input class="form-control d-inline w-auto" type="text" name="search" value="{phrase}" placeholder="Hledat" autofocus />
   <input class="btn btn-admin mt-1 mb-1 mr-1 bold" type="submit" value="Hledat" />
  </span>
 </form>
</div>
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     Fráze <a href="{order-phrase-asc}"><img class="table-icon" src="template/img/up.svg" alt="Fráze vzestupně" /></a><a href="{order-phrase-desc}"><img class="table-icon" src="template/img/down.svg" alt="Fráze sestupně" /></a>
    </th>
    <th class="text-center">
     Počet vyhledání <a href="{order-searches-asc}"><img class="table-icon" src="template/img/up.svg" alt="Počet vyhledání vzestupně" /></a><a href="{order-searches-desc}"><img class="table-icon" src="template/img/down.svg" alt="Počet vyhledání sestupně" /></a>
    </th>
    <th class="text-center">
     Počet vyhledání dle session <a href="{order-searches-by-session-asc}"><img class="table-icon" src="template/img/up.svg" alt="Počet vyhledání dle session vzestupně" /></a><a href="{order-searches-by-session-desc}"><img class="table-icon" src="template/img/down.svg" alt="Počet vyhledání dle session sestupně" /></a>
    </th>
    <th class="text-center">
     Počet vyhledání dle IP <a href="{order-searches-by-ip-asc}"><img class="table-icon" src="template/img/up.svg" alt="Počet vyhledání dle IP vzestupně" /></a><a href="{order-searches-by-ip-desc}"><img class="table-icon" src="template/img/down.svg" alt="Počet vyhledání dle IP sestupně" /></a>
    </th>
    <th class="text-center">
     Počet výsledků hledání <a href="{order-results-asc}"><img class="table-icon" src="template/img/up.svg" alt="Počet výsledků hledání vzestupně" /></a><a href="{order-results-desc}"><img class="table-icon" src="template/img/down.svg" alt="Počet výsledků hledání sestupně" /></a>
    </th>
   </tr>
  </thead>
  <tbody>
   {table-search}
  </tbody>
  <script>
   GetPage('search', {{params}});
  </script>
 </table>
</div>
