<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Produkty</li>
</ol>
<div class="mb-3">
 <form action="./" method="get">
  <a class="btn btn-admin mt-1 mb-1 mr-1 bold" href="./?page=product-new">Nový produkt</a>
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Kategorie: {cat-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{cat-link-all}">Vše</a>
    {categories}
   </div>
  </span>
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Obrázek: {image-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{image-link-all}">Vše</a>
    <a class="dropdown-item" href="{image-link-yes}">Ano</a>
    <a class="dropdown-item" href="{image-link-no}">Ne</a>
   </div>
  </span>
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Pro dospělé: {adult-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{adult-link-all}">Vše</a>
    <a class="dropdown-item" href="{adult-link-yes}">Ano</a>
    <a class="dropdown-item" href="{adult-link-no}">Ne</a>
   </div>
  </span>
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Skrytý: {hidden-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{hidden-link-all}">Vše</a>
    <a class="dropdown-item" href="{hidden-link-yes}">Ano</a>
    <a class="dropdown-item" href="{hidden-link-no}">Ne</a>
   </div>
  </span>
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Video: {video-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{video-link-all}">Vše</a>
    <a class="dropdown-item" href="{video-link-yes}">Ano</a>
    <a class="dropdown-item" href="{video-link-no}">Ne</a>
   </div>
  </span>
  <span>
   {search-values}
   <input class="form-control d-inline w-auto" type="text" name="search" value="{phrase}" placeholder="Hledat" autofocus />
   <input class="btn btn-admin mt-1 mb-1 mr-1 bold" type="submit" value="Hledat" />
  </span>
 </form>
</div>
{error}
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     Název <a href="{order-name-asc}"><img class="table-icon" src="template/img/up.svg" alt="Název vzestupně" /></a><a href="{order-name-desc}"><img class="table-icon" src="template/img/down.svg" alt="Název sestupně" /></a>
    </th>
    <th>
     Kategorie <a href="{order-category-asc}"><img class="table-icon" src="template/img/up.svg" alt="Kategorie vzestupně" /></a><a href="{order-category-desc}"><img class="table-icon" src="template/img/down.svg" alt="Kategorie sestupně" /></a>
    </th>
    <th class="text-center">
     Souborů <a href="{order-files-asc}"><img class="table-icon" src="template/img/up.svg" alt="Souborů vzestupně" /></a><a href="{order-files-desc}"><img class="table-icon" src="template/img/down.svg" alt="Souborů sestupně" /></a>
    </th>
    <th class="text-center">
     Obrázek <a href="{order-image-asc}"><img class="table-icon" src="template/img/up.svg" alt="Obrázek vzestupně" /></a><a href="{order-image-desc}"><img class="table-icon" src="template/img/down.svg" alt="Obrázek sestupně" /></a>
    </th>
    <th class="text-center">
     Video <a href="{order-video-asc}"><img class="table-icon" src="template/img/up.svg" alt="Video vzestupně" /></a><a href="{order-video-desc}"><img class="table-icon" src="template/img/down.svg" alt="Video sestupně" /></a>
    </th>
    <th class="text-center">
     Pro dospělé <a href="{order-adult-asc}"><img class="table-icon" src="template/img/up.svg" alt="Pro dospělé vzestupně" /></a><a href="{order-adult-desc}"><img class="table-icon" src="template/img/down.svg" alt="Pro dospělé sestupně" /></a>
    </th>
    <th class="text-center">
     Skrytý <a href="{order-hidden-asc}"><img class="table-icon" src="template/img/up.svg" alt="Skrytý vzestupně" /></a><a href="{order-hidden-desc}"><img class="table-icon" src="template/img/down.svg" alt="Skrytý sestupně" /></a>
    </th>
    <th class="text-center">
     Návštěv <a href="{order-visits-asc}"><img class="table-icon" src="template/img/up.svg" alt="Návštěv vzestupně" /></a><a href="{order-visits-desc}"><img class="table-icon" src="template/img/down.svg" alt="Návštěv sestupně" /></a><br /><span class="font-small">(celkem / dle session / dle IP)</span>
    </th>
    <th>
     Vytvořeno <a href="{order-created-asc}"><img class="table-icon" src="template/img/up.svg" alt="Vytvořeno vzestupně" /></a><a href="{order-created-desc}"><img class="table-icon" src="template/img/down.svg" alt="Vytvořeno sestupně" /></a>
    </th>
    <th>Akce</th>
   </tr>
  </thead>
  <tbody>
   {products}
  </tbody>
  <script>
   GetPage('products', {{params}});
  </script>
 </table>
</div>
