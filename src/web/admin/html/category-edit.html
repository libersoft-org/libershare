<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('categories')">Categories</a></li>
 <li class="item active">Edit</li>
</ol>
<div class="card">
 <div class="header">Category edit - {NAME}</div>
 <div class="body">
  {ERROR}
  <label>Category name:</label>
  <input type="text" name="name" id="name" maxlength="64" value="{NAME}" placeholder="Category name" oninput="getLink();" required autofocus />
  <label>Category link:</label>
  <input type="text" name="link" id="link" maxlength="64" value="{LINK}" placeholder="Category link" required />
  {ICON-EDIT}
  <input type="hidden" name="id" value="{ID}" />
  <a class="button primary" onclick="categoryEdit()">Edit</a>
 </div>
</div>
