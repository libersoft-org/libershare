<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('categories')">Categories</a></li>
 <li class="item active">New</li>
</ol>
<div class="card center">
 <div class="header">New category</div>
 <div class="body">
  {ERROR}
  <div>Category name:</div>
  <input type="text" name="name" id="name" maxlength="64" placeholder="Category name" oninput="getLink();" required autofocus />
  <div>Category link:</div>
  <input type="text" name="link" id="link" maxlength="64" placeholder="Category link" required />
  <div>Icon: (SVG / GIF / PNG / JPG)</div>
  <input type="file" name="icon" />
  <a class="button primary" onclick="categoryNew()">Create</a>
 </div>
</div>
