<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item"><a onclick="f.getPage('categories')">Categories</a></li>
 <li class="breadcrumb-item active">New</li>
</ol>
<div class="card card-sm mb-3 center">
 <div class="card-header bg-admin text-white bold">New category</div>
 <div class="card-body">
  {ERROR}
  <div>Category name:</div>
  <input type="text" name="name" id="name" maxlength="64" placeholder="Category name" oninput="getLink();" required autofocus />
  <div>Category link:</div>
  <input type="text" name="link" id="link" maxlength="64" placeholder="Category link" required />
  <div>Icon: (SVG / GIF / PNG / JPG)</div>
  <input class="form-control-file" type="file" name="icon" />
  <a class="button primary" onclick="categoryNew()">Create</a>
 </div>
</div>
