<ol class="breadcrumb">
 <li class="item active">Item files</li>
</ol>
<div>
 <span>
  {SEARCH-VALUES}
  <input type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
  <a class="button primary">Search</a>
 </span>
</div>
{ERROR}
<table>
 <thead>
  <tr>
   <th>
    <span>Name</span>
    <a href="{ORDER-NAME-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-NAME-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Item</span>
    <a href="{ORDER-ITEM-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-ITEM-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Playable</span>
    <a href="{ORDER-PLAYABLE-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-PLAYABLE-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Size</span>
    <a href="{ORDER-SIZE-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-SIZE-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>IP address</span>
    <a href="{ORDER-IP-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-IP-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Downloads</span>
    <a href="{ORDER-DOWNLOADS-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-DOWNLOADS-DESC}"><img src="img/down.svg" alt="Descending" /></a>
    <span class="font-small">(all / by session / by IP)</span>
   </th>
   <th class="text-center">
    <span>Plays</span>
    <a href="{ORDER-PLAYS-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-PLAYS-DESC}"><img src="img/down.svg" alt="Descending" /></a>
    <span class="font-small">(all / by session / by IP)</span>
   </th>
   <th>
    <span>Created</span>
    <a href="{ORDER-CREATED-ASC}"><img src="img/up.svg" alt="Ascending" /></a>
    <a href="{ORDER-CREATED-DESC}"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>Action</th>
  </tr>
 </thead>
 <tbody>{FILES}</tbody>
 <script>getPage('files', {{PARAMS}});</script>
</table>
