<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Product files</li>
</ol>
<div class="mb-3">
 <form action="./" method="get">
  <span class="dropdown">
   <a class="button" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Playable: {PLAYABLE-SELECTED}</a>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{PLAYABLE-LINK-ALL}">All</a>
    <a class="dropdown-item" href="{PLAYABLE-LINK-YES}">Yes</a>
    <a class="dropdown-item" href="{PLAYABLE-LINK-NO}">No</a>
   </div>
  </span>
  <span>
   {SEARCH-VALUES}
   <input class="form-control d-inline w-auto" type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
   <a class="button">Search</a>
  </span>
 </form>
</div>
{ERROR}
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     <span>Name</span>
     <a href="{ORDER-NAME-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-NAME-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th>
     <span>Product</span>
     <a href="{ORDER-PRODUCT-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-PRODUCT-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th class="text-center">
     <span>Playable</span>
     <a href="{ORDER-PLAYABLE-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-PLAYABLE-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th>
     <span>Size</span>
     <a href="{ORDER-SIZE-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-SIZE-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th>
     <span>IP address</span>
     <a href="{ORDER-IP-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-IP-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th class="text-center">
     <span>Downloads</span>
     <a href="{ORDER-DOWNLOADS-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-DOWNLOADS-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
     <span class="font-small">(all / by session / by IP)</span>
    </th>
    <th class="text-center">
     <span>Plays</span>
     <a href="{ORDER-PLAYS-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-PLAYS-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
     <span class="font-small">(all / by session / by IP)</span>
    </th>
    <th>
     <span>Created</span>
     <a href="{ORDER-CREATED-ASC}"><img class="table-icon" src="img/up.svg" alt="Ascending" /></a>
     <a href="{ORDER-CREATED-DESC}"><img class="table-icon" src="img/down.svg" alt="Descending" /></a>
    </th>
    <th>Action</th>
   </tr>
  </thead>
  <tbody>
   {files}
  </tbody>
  <script>
   getPage('files', {{PARAMS}});
  </script>
 </table>
</div>
