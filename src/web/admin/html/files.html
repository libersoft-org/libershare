<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item active">Soubory produktů</li>
</ol>
<div class="mb-3">
 <form action="./" method="get">
  <span class="dropdown">
   <button class="btn btn-primary dropdown-toggle mt-1 mb-1 mr-1 bold" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">K přehrání: {playable-selected}</button>
   <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
    <a class="dropdown-item" href="{playable-link-all}">Vše</a>
    <a class="dropdown-item" href="{playable-link-yes}">Ano</a>
    <a class="dropdown-item" href="{playable-link-no}">Ne</a>
   </div>
  </span>
  <span>
   {search-values}
   <input class="form-control d-inline w-auto" type="text" name="search" value="{phrase}" placeholder="Hledat" autofocus />
   <input class="btn btn-admin mt-1 mb-1 mr-1 bold" type="submit" value="Hledat" />
  </span>
 </form>
</div>
{error}
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>
     Název <a href="{order-name-asc}"><img class="table-icon" src="template/img/up.svg" alt="Název vzestupně" /></a><a href="{order-name-desc}"><img class="table-icon" src="template/img/down.svg" alt="Název sestupně" /></a>
    </th>
    <th>
     Produkt <a href="{order-product-asc}"><img class="table-icon" src="template/img/up.svg" alt="Produkt vzestupně" /></a><a href="{order-product-desc}"><img class="table-icon" src="template/img/down.svg" alt="Produkt sestupně" /></a>
    </th>
    <th class="text-center">
     K přehrání <a href="{order-playable-asc}"><img class="table-icon" src="template/img/up.svg" alt="K přehrání vzestupně" /></a><a href="{order-playable-desc}"><img class="table-icon" src="template/img/down.svg" alt="K přehrání sestupně" /></a>
    </th>
    <th>
     Velikost <a href="{order-size-asc}"><img class="table-icon" src="template/img/up.svg" alt="Velikost vzestupně" /></a><a href="{order-size-desc}"><img class="table-icon" src="template/img/down.svg" alt="Velikost sestupně" /></a>
    </th>
    <th>
     IP odesílatele <a href="{order-ip-asc}"><img class="table-icon" src="template/img/up.svg" alt="IP odesílatele vzestupně" /></a><a href="{order-ip-desc}"><img class="table-icon" src="template/img/down.svg" alt="IP odesílatele sestupně" /></a>
    </th>
    <th class="text-center">
     Stažení <a href="{order-downloads-asc}"><img class="table-icon" src="template/img/up.svg" alt="Stažení vzestupně" /></a><a href="{order-downloads-desc}"><img class="table-icon" src="template/img/down.svg" alt="Stažení sestupně" /></a><br /><span class="font-small">(celkem / dle session / dle IP)</span>
    </th>
    <th class="text-center">
     Přehrání <a href="{order-plays-asc}"><img class="table-icon" src="template/img/up.svg" alt="Přehrání vzestupně" /></a><a href="{order-plays-desc}"><img class="table-icon" src="template/img/down.svg" alt="Přehrání sestupně" /></a><br /><span class="font-small">(celkem / dle session / dle IP)</span>
    </th>
    <th>
     Vytvořeno <a href="{order-created-asc}"><img class="table-icon" src="template/img/up.svg" alt="Vytvořeno vzestupně" /></a><a href="{order-created-desc}"><img class="table-icon" src="template/img/down.svg" alt="Vytvořeno sestupně" /></a>
    </th>
    <th>Akce</th>
   </tr>
  </thead>
  <tbody>
   {files}
  </tbody>
  <script>
   GetPage('files', {
           {
               params
           }
           })
           ;
  </script>
 </table>
</div>
