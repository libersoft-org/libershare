<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item"><a href="./?page=products">Produkty</a></li>
 <li class="breadcrumb-item active">Nový</li>
</ol>
<div class="card card-sm mb-3 center">
 <div class="card-header bg-admin text-white bold">Nový produkt</div>
 <div class="card-body">
  {error}
  <form enctype="multipart/form-data" action="./product-new.php" method="post">
   <div class="form-group">
    <label>Název produktu:</label>
    <input class="form-control" type="text" name="name" id="name" maxlength="255" placeholder="Název produktu" oninput="getLink();" required autofocus />
   </div>
   <div class="form-group">
    <label>Odkaz produktu:</label>
    <input class="form-control" type="text" name="link" id="link" maxlength="255" placeholder="Odkaz produktu" required />
   </div>
   <div class="form-group">
    <label>Kategorie:</label>
    <select class="form-control" name="id_category" required>
     <option value="">-</option>
     {categories}
    </select>
   </div>
   <div class="form-group custom-control custom-checkbox">
    <input name="adult" type="checkbox" class="custom-control-input" id="adult" />
    <label class="custom-control-label" for="adult">Pouze pro dospělé</label>
   </div>
   <div class="form-group custom-control custom-checkbox">
    <input name="hidden" type="checkbox" class="custom-control-input" id="hidden" />
    <label class="custom-control-label" for="hidden">Skrytý</label>
   </div>
   <div class="form-group">
    <label>Obrázek produktu: (JPG / PNG)</label>
    <input class="form-control-file" type="file" name="image" />
   </div>
   <input type="submit" value="Vytvořit" class="btn btn-lg btn-primary btn-size btn-block" />
  </form>
 </div>
</div>
