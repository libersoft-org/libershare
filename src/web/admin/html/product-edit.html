<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item"><a onclick="getPage('products')">Products</a></li>
 <li class="breadcrumb-item active">Edit</li>
</ol>
<div class="card card-sm mb-3 center">
 <div class="card-header bg-admin text-white bold">Product edit - {NAME}</div>
 <div class="card-body">
  {ERROR}
  <form enctype="multipart/form-data" action="./product-edit.php" method="post">
   <div class="form-group">
    <input id="name" class="form-control" name="name" maxlength="255" value="{NAME}" placeholder="Product name" oninput="getLink();" required autofocus />
   </div>
   <div class="form-group">
    <input id="link" class="form-control" name="link" maxlength="255" value="{LINK}" placeholder="Product link" required />
   </div>
   <div class="form-group">
    <label>Kategorie:</label>
    <select class="form-control" name="id_category" required>
     <option value="">-</option>
     {CATEGORIES}
    </select>
   </div>
   <div class="form-group">
    <label>Video:</label>
    <select class="form-control" name="id_video">
     <option value="">-</option>
     {VIDEOS}
    </select>
   </div>
   <div class="form-group custom-control custom-checkbox">
    <input name="adult" type="checkbox" class="custom-control-input" id="adult" {ADULT-CHECKED} />
    <label class="custom-control-label" for="adult">Adult only</label>
   </div>
   <div class="form-group custom-control custom-checkbox">
    <input name="hidden" type="checkbox" class="custom-control-input" id="hidden" {HIDDEN-CHECKED} />
    <label class="custom-control-label" for="hidden">Hidden</label>
   </div>
   <div class="form-group">{IMAGE-EDIT}</div>
   <input type="hidden" name="id" value="{ID}" />
   <a class="button primary" onclick="productEdit()">Edit</a>
  </form>
 </div>
</div>
<div class="table-responsive">
 <table class="table table-sm table-hover table-light">
  <thead class="thead-admin">
   <tr>
    <th>Name</th>
    <th class="text-center">Playable</th>
    <th>Size</th>
    <th>IP address</th>
    <th class="text-center">Downloads<br /><span class="font-small">(all / by session / by IP)</span></th>
    <th class="text-center">Plays<br /><span class="font-small">(all / by session / by IP)</span></th>
    <th>Created</th>
    <th>Action</th>
   </tr>
  </thead>
  <tbody>
   {TABLE-FILES}
  </tbody>
 </table>
</div>
