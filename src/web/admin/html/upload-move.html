<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item"><a href="./?page=uploads">Uploady</a></li>
 <li class="breadcrumb-item active">Přesunutí uploadu</li>
</ol>
<div class="card card-sm mb-3 center">
 <div class="card-header bg-admin text-white bold">Přesunutí uploadu - {name}</div>
 <div class="card-body">
  {error}
  <form action="./upload-move.php" method="post">
   <div class="form-group">
    <label>Přesunout do produktu:</label>
    <div id="product-name" style="display: none"></div>
    <input id="products-search" class="form-control" type="text" oninput="getProductsDropdown();" placeholder="Vyhledání produktu" autofocus />
   </div>
   <input id="id-product" type="hidden" name="id_product" value="" />
   <div class="form-group custom-control custom-checkbox">
    <input name="playable" type="checkbox" class="custom-control-input" id="playable" />
    <label class="custom-control-label" for="playable">Určeno k přehrávání</label>
   </div>
   <div class="form-group">
    <table>
     <tr>
      <th class="pr-3">Název souboru:</th>
      <td>{name}</td>
     </tr>
     <tr>
      <th class="pr-3">Velikost:</th>
      <td>{size}</td>
     </tr>
     <tr>
      <th class="pr-3">IP uploadera:</th>
      <td>{ip}</td>
     </tr>
     <tr>
      <th class="pr-3">Link:</th>
      <td>{link}</td>
     </tr>
     <tr>
      <th class="pr-3">Vytvořen:</th>
      <td>{created}</td>
     </tr>
    </table>
   </div>
   <input type="hidden" name="id" value="{id}" />
   <input type="submit" value="Přesunout" class="btn btn-lg btn-primary btn-size btn-block" />
  </form>
 </div>
</div>
