<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('uploads')">Uploads</a></li>
 <li class="item active">Move upload</li>
</ol>
<div class="card center">
 <div class="header">Move upload - {NAME}</div>
 <div class="body">
  {ERROR}
  <label>Move to item:</label>
  <div id="item-name" style="display: none"></div>
  <input id="items-search" type="text" oninput="getItemsDropdown();" placeholder="Item search" autofocus />
  <input id="id-item" type="hidden" name="id_item" value="" />
  <table>
   <tr><th>File name:</th><td>{NAME}</td></tr>
   <tr><th>Size:</th><td>{SIZE}</td></tr>
   <tr><th>IP uploadera:</th><td>{IP}</td></tr>
   <tr><th>Link:</th><td>{LINK}</td></tr>
   <tr><th>Created:</th><td>{CREATED}</td></tr>
  </table>
  <input type="hidden" name="id" value="{ID}" />
  <a class="button primary" onclick="uploadMove()">Move</a>
 </div>
</div>
