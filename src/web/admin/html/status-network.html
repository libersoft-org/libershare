<table class="table">

 </tr>
 <tr>
  <th class="table-label">Upload:</th>
  <td>{upload}</td>
 </tr>

  <th class="table-label">Download:</th>

 </tr>
</table>

<img class="img-stat mw-100" src="../img/stats/netstat_h_{name}.png" alt="{name} - hourly" /><br /><br />
<img class="img-stat mw-100" src="../img/stats/netstat_d_{name}.png" alt="{name} - daily" /><br /><br />
<img class="img-stat mw-100" src="../img/stats/netstat_m_{name}.png" alt="{name} - monthly" /><br /><br />
<img class="img-stat mw-100" src="../img/stats/netstat_t_{name}.png" alt="{name} - top 10" /><br /><br />
