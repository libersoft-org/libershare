<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('items')">Items</a></li>
 <li class="item active">Edit</li>
</ol>
<div class="card center">
 <div class="header">Item edit - {NAME}</div>
 <div class="body">
  {ERROR}
  <input id="name" name="name" maxlength="255" value="{NAME}" placeholder="Item name" oninput="getLink();" required autofocus />
  <input id="link" name="link" maxlength="255" value="{LINK}" placeholder="Item link" required />
  <label>Kategorie:</label>
  <select name="id_category" required>
   <option value="">-</option>
   {CATEGORIES}
  </select>
  <label>Video:</label>
  <select name="id_video">
   <option value="">-</option>
   {VIDEOS}
  </select>
  <input name="adult" type="checkbox" id="adult" {ADULT-CHECKED} />
  <label for="adult">Adult only</label>
  <input name="hidden" type="checkbox" id="hidden" {HIDDEN-CHECKED} />
  <label for="hidden">Hidden</label>
  {IMAGE-EDIT}
  <input type="hidden" name="id" value="{ID}" />
  <a class="button primary" onclick="itemEdit()">Edit</a>
 </div>
</div>
<table>
 <thead>
  <tr>
   <th>Name</th>
   <th class="text-center">Playable</th>
   <th>Size</th>
   <th>IP address</th>
   <th class="text-center">Downloads<br /><span class="font-small">(all / by session / by IP)</span></th>
   <th class="text-center">Plays<br /><span class="font-small">(all / by session / by IP)</span></th>
   <th>Created</th>
   <th>Action</th>
  </tr>
 </thead>
 <tbody>{TABLE-FILES}</tbody>
</table>
