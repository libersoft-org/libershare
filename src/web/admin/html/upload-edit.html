<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('uploads')">Uploads</a></li>
 <li class="item active">Edit</li>
</ol>
<div class="card center">
 <div class="header">Upload edit - {NAME}</div>
 <div class="body">
  {ERROR}
  <label>File name:</label>
  <input type="text" id="name" name="name" maxlength="255" value="{NAME}" placeholder="File name" required autofocus />
  <table>
   <tr>
    <th>Size:</th>
    <td>{SIZE}</td>
   </tr>
   <tr>
    <th>IP address:</th>
    <td>{IP}</td>
   </tr>
   <tr>
    <th>Link:</th>
    <td>{LINK}</td>
   </tr>
   <tr>
    <th>Created:</th>
    <td>{CREATED}</td>
   </tr>
  </table>
  <input type="hidden" name="id" value="{ID}" />
  <a class="button primary" onclick="uploadEdit()">Edit</a>
 </div>
</div>
