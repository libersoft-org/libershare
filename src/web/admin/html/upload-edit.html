<ol class="breadcrumb bg-danger text-light">
 <li class="breadcrumb-item"><a href="./?page=uploads">Uploady</a></li>
 <li class="breadcrumb-item active">Úprava uploadu</li>
</ol>
<div class="card card-sm mb-3 center">
 <div class="card-header bg-admin text-white bold">Úprava uploadu - {name}</div>
 <div class="card-body">
  {error}
  <form action="./upload-edit.php" method="post">
   <div class="form-group">
    <label>Název souboru:</label>
    <input type="text" id="name" class="form-control" name="name" maxlength="255" value="{name}" placeholder="Název souboru" required autofocus />
   </div>
   <div class="form-group">
    <table>
     <tr>
      <th class="pr-3">Velikost:</th>
      <td>{size}</td>
     </tr>
     <tr>
      <th class="pr-3">IP uploadera:</th>
      <td>{ip}</td>
     </tr>
     <tr>
      <th class="pr-3">Link:</th>
      <td>{link}</td>
     </tr>
     <tr>
      <th class="pr-3">Vytvořen:</th>
      <td>{created}</td>
     </tr>
    </table>
   </div>
   <input type="hidden" name="id" value="{id}" />
   <input type="submit" value="Upravit" class="btn btn-lg btn-primary btn-size btn-block" />
  </form>
 </div>
</div>
