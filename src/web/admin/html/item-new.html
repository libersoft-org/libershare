<ol class="breadcrumb">
 <li class="item"><a onclick="getPage('items')">Items</a></li>
 <li class="item active">New</li>
</ol>
<div class="card center">
 <div class="header">New item</div>
 <div class="body">
  {ERROR}
  <label>Item name:</label>
  <input type="text" name="name" id="name" maxlength="255" placeholder="Item name" oninput="getLink();" required autofocus />
  <label>Item link:</label>
  <input type="text" name="link" id="link" maxlength="255" placeholder="Item link" required />
  <label>Category:</label>
  <select name="id_category" required>
   <option value="">-</option>
   {CATEGORIES}
  </select>
  <input name="adult" type="checkbox" class="custom-control-input" id="adult" />
  <label for="adult">Adult only</label>
  <input name="hidden" type="checkbox" class="custom-control-input" id="hidden" />
  <label for="hidden">Hidden</label>
  <label>Item image: (JPG / PNG)</label>
  <input type="file" name="image" />
 </div>
 <a class="button primary" onclick="itemNew()">Create</a>
</div>
