<div class="card center">
 <div class="header">New thread</div>
 <div class="body">
  <div class="notice red" id="error-message"></div>
  <label>Subject:</label>
  <input type="text" name="subject" />
  <label>Message text:</label>
  <textarea name="body" rows="5"></textarea>
  <label>Write a text from the image:</label>
  <input type="text" name="captcha" />
  <div><img src="captcha/{CAPTCHA}" alt="Captcha" /></div>
  <a class="button primary" onclick="send('forum-new-thread')">Send</a>
 </div>
</div>
