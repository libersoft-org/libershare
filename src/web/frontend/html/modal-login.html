<div>Username:</div>
<input type="text" name="username" />
<div>Password:</div>
<input type="password" name="password" />
<div id="static-captcha">
 <div class="captch">
  <img id="captcha-container" src="" alt="" />
  <img class="reload-icon" src="/img/reload.svg" onclick="f.regenCaptcha()" alt="" />
 </div>
 <input type="text" id="cid" name="cid" />
 <input type="text" name="captcha" class="captcha-input" placeholder="Enter the text from image" />
</div>
<div>Don't have your free account? - <a onclick="getModalRegistration()">register now!</a></div>
<div class="red bold">Why should I log in?</div>
<div>Logged users can download files, play video and discuss in forum <span class="bold">FOR FREE</span>.</div>
<div class="notice red"></div>
<div class="buttons">
 <a class="button primary" onclick="login()">
  <img src="/img/login.svg" alt="Login" />
  <span>Login</span>
 </a>
</div>
