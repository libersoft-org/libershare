<div class="card small center">
 <div class="header">Provozovatel služby</div>
 <div class="body">
  LiberShare Ltd.<br />
  Liberty Street 1<br />
  Liberland<br />
  Registration No.: 00000000
 </div>
</div>
<div class="separator"></div>
<div class="card small center">
 <div class="header">Kontaktní formulář</div>
 <div class="body">
  <form id="contact">
   <div class="alert alert-danger" id="contact-error" style="display: none"></div>
   <div class="alert alert-success" id="contact-success" style="display: none"></div>
   <div class="form-group">
    <label>Vaše celé jméno:</label>
    <input type="text" class="form-control" name="name" />
   </div>
   <div class="form-group">
    <label>Vaše e-mailová adresa:</label>
    <input type="email" class="form-control" name="email" placeholder="@" />
   </div>
   <div class="form-group">
    <label>Předmět zprávy:</label>
    <input type="text" class="form-control" name="subject" />
   </div>
   <div class="form-group">
    <label>Text zprávy:</label>
    <textarea class="form-control" name="body" rows="5"></textarea>
   </div>
   <div class="form-group">
    <label>Potvrzení:</label>
    <div id="static-captcha"></div>
   </div>
   <input type="submit" value="Odeslat" class="btn btn-lg btn-success btn-size" />
  </form>
 </div>
</div>
