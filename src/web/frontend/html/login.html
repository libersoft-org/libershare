<div class="modal-header">
 <span class="modal-title">Login</span>
 <span class="modal-close" onclick="f.closeModalN()">&times;</span>
</div>
<div class="modal-body">
 <div class="p-3">
  <div class="card form-size-sm mb-3 center">
   <div class="card-body">
    <form id="login" action="/api/validate_login" method="POST">
     <div class="notice red" id="login-error" style="display: none"></div>
     <div class="form-group">
      <label>Username: <span class="text-red"></span></label>
      <input type="text" class="form-control" name="username" />
     </div>
     <div class="form-group">
      <label>Password: <span class="text-red"></span></label>
      <input type="password" class="form-control" name="password" />
     </div>
     <div class="form-group">
      <div id="static-captcha">
       <div class="captch">
        <img id="captcha-container" src="" alt="" />
        <img class="reload-icon" src="../img/reload.svg" onclick="f.regenCaptcha()" alt="" />
       </div>
       <input type="text" id="cid" name="cid" style="display: none !important" />
       <input type="text" name="captcha" class="form-control" id="captcha-input" placeholder="Enter text from image" />
      </div>
     </div>
     <div class="small pb-3"><span class="toggle" onclick="openModal('registration')">Not yet registered - register</span></div>
     <button type="button" class="btn btn-lg btn-success btn-size" onclick="submitForm('login')">Login</button>
    </form>
   </div>
  </div>
 </div>
</div>
