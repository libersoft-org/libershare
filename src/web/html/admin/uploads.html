<ol class="breadcrumb">
 <li class="item active">Uploads</li>
</ol>
<div>
 <span>
  {SEARCH-VALUES}
  <input type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
  <a class="button primary" onclick="search()">Search</a>
 </span>
</div>
<table>
 <thead>
  <tr>
   <th>
    <span>Name</span>
    <a onclick="sort('{ORDER-NAME-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-NAME-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Size</span>
    <a onclick="sort('{ORDER-SIZE-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SIZE-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>IP address</span>
    <a onclick="sort('{ORDER-IP-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-IP-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Downloads</span>
    <a onclick="sort('{ORDER-DOWNLOADS-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-DOWNLOADS-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
    <span class="font-small">(all / by session / by IP)</span>
   </th>
   <th>
    <span>Created</span>
    <a onclick="sort('{ORDER-CREATED-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-CREATED-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>Action</th>
  </tr>
 </thead>
 <tbody>{UPLOADS}</tbody>
 <script>getPage('uploads', {{params}});</script>
</table>
