<ol class="breadcrumb">
 <li class="item"><a onclick="f.getPage('files')">Item files</a></li>
 <li class="item active">Edit file</li>
</ol>
<div class="card center">
 <div class="header">Edit file - {NAME}</div>
 <div class="body">
  {ERROR}
  <label>File name:</label>
  <input type="text" id="name" name="name" maxlength="255" value="{NAME}" placeholder="File name" required autofocus />
  <label>Item:</label>
  <input id="items-search" type="text" oninput="getItemsDropdown();" placeholder="Search item" />
  <div id="item-name"></div>
  <input id="id-item" type="hidden" name="id_item" value="" />
  <table>
   <tr>
    <th>Item:</th>
    <td>{ITEM-NAME}</td>
   </tr>
   <tr>
    <th>Size:</th>
    <td>{SIZE}</td>
   </tr>
   <tr>
    <th>IP address:</th>
    <td>{IP}</td>
   </tr>
   <tr>
    <th>Link:</th>
    <td>{LINK}</td>
   </tr>
   <tr>
    <th>Created:</th>
    <td>{CREATED}</td>
   </tr>
  </table>
  <input type="hidden" name="id" value="{ID}" />
  <a onclick="f.getPage('file-edit')">Edit</a>
 </div>
 <script>setItem('{ID-ITEM}', '{ITEM-NAME}');</script>
</div>
