<ol class="breadcrumb">
 <li class="item active">Log</li>
</ol>
<span class="dropdown">
 <a class="button primary" id="dropdownMenuButton" data-toggle="dropdown">Admin: {ADMIN-SELECTED}</a>
 <div class="dropdown-menu">
  <a class="dropdown-item" onclick="sort('{ADMIN-LINK-ALL}')">All</a>
  {ADMINS}
 </div>
</span>
<table>
 <thead>
  <tr>
   <th>
    <span>Admin name</span>
    <a onclick="sort('{ORDER-NAME-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-NAME-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Message</span>
    <a onclick="sort('{ORDER-MESSAGE-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-MESSAGE-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>IP address</span>
    <a onclick="sort('{ORDER-IP-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-IP-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Session ID</span>
    <a onclick="sort('{ORDER-SESSION-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SESSION-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>User agent</span>
    <a onclick="sort('{ORDER-USERAGENT-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-USERAGENT-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th>
    <span>Date and time</span>
    <a onclick="sort('{ORDER-CREATED-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-CREATED-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
  </tr>
 </thead>
 <tbody>{TABLE-LOG}</tbody>
 <script>getPage('log', {{params}});</script>
</table>
