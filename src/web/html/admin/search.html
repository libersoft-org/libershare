<ol class="breadcrumb">
 <li class="item active">Search stats</li>
</ol>
<div>
 <span>
  {SEARCH-VALUES}
  <input type="text" name="search" value="{PHRASE}" placeholder="Search" autofocus />
  <a class="button primary" onclick="fullSearch()">Search</a>
 </span>
</div>
<table>
 <thead>
  <tr>
   <th>
    <span>Phrase</span>
    <a onclick="sort('{ORDER-PHRASE-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-PHRASE-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Searches</span>
    <a onclick="sort('{ORDER-SEARCHES-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SEARCHES-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Searches by session</span>
    <a onclick="sort('{ORDER-SEARCHES-BY-SESSION-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SEARCHES-BY-SESSION-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Searches by IP</span>
    <a onclick="sort('{ORDER-SEARCHES-BY-IP-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-SEARCHES-BY-IP-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
   <th class="text-center">
    <span>Search results</span>
    <a onclick="sort('{ORDER-RESULTS-ASC}')"><img src="img/up.svg" alt="Ascending" /></a>
    <a onclick="sort('{ORDER-RESULTS-DESC}')"><img src="img/down.svg" alt="Descending" /></a>
   </th>
  </tr>
 </thead>
 <tbody>{TABLE-SEARCH}</tbody>
</table>
<script>getPage('search', {{params}});</script>
