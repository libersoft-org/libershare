<div class="left">
 <a class="item menu-news" onclick="f.getPage('')">
  <img class="icon" src="{ICON-NEWS}" alt="News" />
  <span class="label">News</span>
 </a>
 <a class="item menu-categories" onclick="f.getPage('categories')">
  <img class="icon" src="{ICON-CATEGORIES}" alt="Categories" />
  <span class="label">Categories</span>
 </a>
 <a class="item menu-uploads" onclick="f.getPage('uploads')">
  <img class="icon" src="{ICON-UPLOAD}" alt="Uploads" />
  <span class="label">Uploads</span>
 </a>
 <a class="item menu-forum" onclick="f.getPage('forum')">
  <img class="icon" src="{ICON-FORUM}" alt="Forum" />
  <span class="label">Forum</span>
 </a>
 <a class="item menu-faq" onclick="f.getPage('faq')">
  <img class="icon" src="{ICON-FAQ}" alt="FAQ" />
  <span class="label">FAQ</span>
 </a>
 <a class="item menu-terms" onclick="f.getPage('terms')">
  <img class="icon" src="{ICON-TERMS}" alt="Terms" />
  <span class="label">Terms</span>
 </a>
 <a class="item menu-contact" onclick="f.getPage('contact')">
  <img class="icon" src="{ICON-CONTACT}" alt="Contact" />
  <span class="label">Contact</span>
 </a>
</div>
<div class="right">
 <div class="search">
  <input class="text" type="search" name="phrase" placeholder="Search" onkeypress="searchEnter(event)" autofocus />
  <a class="submit-button" onclick="fullSearch()"><img src="{ICON-SEARCH}" alt="Search" /></a>
 </div>
 <a class="item menu-profile" onclick="getProfile()">
  <img class="icon" src="{ICON-SETTINGS}" alt="{NAME}" />
  <span class="label">{NAME}</span>
 </a>
 <a class="item menu-login" onclick="getModalLogin()">
  <img class="icon" src="{ICON-LOGIN}" alt="Login" />
  <span class="label">Login</span>
 </a>
</div>
