<div class="card medium center">
 <div class="header">{THREAD-TOPIC}</div>
 <div class="body">
  <div class="thread">
   <div>
    <span class="bold">Autor:</span>
    <span class="{THREAD-SEX}">{THREAD-USER}</span>
   </div>
   <div>
    <span class="bold">Datum:</span>
    <span>{THREAD-CREATED}</span>
   </div>
   <div class="separator"></div>
   {THREAD-BODY}
   <hr />
  </div>
  <div class="posts"></div>
 </div>
</div>
